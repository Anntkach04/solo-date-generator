function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function useWheelPool(level) {
  const [wheelItems, setWheelItems] = useState(() => shuffle(POOLS[level]).slice(0, 6));
  const [recentlyUsed, setRecentlyUsed] = useState([]);
  const spinCountRef = useRef(0);

  useEffect(() => {
    setWheelItems(shuffle(POOLS[level]).slice(0, 6));
    setRecentlyUsed([]);
    spinCountRef.current = 0;
  }, [level]);

  const recentRef = useRef([]);
  const stableRefresh = useCallback((selectedItem) => {
    spinCountRef.current += 1;
    const replaceCount = spinCountRef.current % 3 === 0 ? 2 : 1;
    const pool = POOLS[level];
    const newRecent = [...recentRef.current, selectedItem].slice(-20);
    recentRef.current = newRecent;

    setWheelItems(current => {
      let available = pool.filter(
        item => !current.includes(item) && !newRecent.includes(item)
      );
      if (available.length < replaceCount) {
        const minRecent = newRecent.filter(item => current.includes(item));
        recentRef.current = minRecent;
        available = pool.filter(item => !current.includes(item) && !minRecent.includes(item));
      }
      const picked = shuffle(available).slice(0, replaceCount);
      if (picked.length === 0) return current;
      const slots = shuffle([0,1,2,3,4,5]).slice(0, picked.length);
      const next = [...current];
      slots.forEach((idx, i) => { next[idx] = picked[i]; });
      return next;
    });
  }, [level]);

  return { wheelItems, refresh: stableRefresh };
}

   WHEEL COMPONENT

function SpinningWheel({ items, onResult }) {
  const canvasRef = useRef(null);
  const rotRef    = useRef(0);
  const animRef   = useRef(null);
  const [spinning, setSpinning] = useState(false);
  const wheelImg  = useRef(null);

  useEffect(() => {
    const img = new Image();
    img.src = 'assets/spining circle new.png';
    img.onload = () => { wheelImg.current = img; draw(rotRef.current); };
  }, []);

  const draw = useCallback((rot) => {
    const cvs = canvasRef.current;
    if (!cvs) return;
    const ctx = cvs.getContext('2d');
    const W = cvs.width, H = cvs.height;
    const cx = W / 2, cy = H / 2;
    const R = W / 2 - 6;
    const n = items.length;
    const seg = (2 * Math.PI) / n;

    ctx.clearRect(0, 0, W, H);

    // Draw rotated wheel image
    if (wheelImg.current) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);
      ctx.drawImage(wheelImg.current, -cx, -cy, W, H);
      ctx.restore();
    }

    // Draw text labels on top
    items.forEach((label, i) => {
      const midA = rot + i * seg - Math.PI / 2 + seg / 2;
      const innerR = 28; // approx center disc radius (scaled)
      const textR = innerR + (R - innerR) * 0.55;
      let tx = cx + Math.cos(midA) * textR;
      let ty = cy + Math.sin(midA) * textR;

      const dx = tx - cx;
      const dy = ty - cy;
      const len = Math.sqrt(dx * dx + dy * dy);
      tx = tx - 40 * dx / len;
      ty = ty - 40 * dy / len;

      ctx.save();
      ctx.translate(tx, ty);
      ctx.rotate(midA + Math.PI / 2);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#7a2a52';
      ctx.font = 'bold 28px "Pixelify Sans", monospace';

      const words = label.split(' ');
      if (words.length === 1 || label.length <= 12) {
        ctx.fillText(label, 0, 0);
      } else {
        const mid = Math.ceil(words.length / 2);
        ctx.fillText(words.slice(0, mid).join(' '), 0, -14);
        ctx.fillText(words.slice(mid).join(' '), 0, 14);
      }
      ctx.restore();
    });
  }, [items]);

  useEffect(() => { draw(rotRef.current); }, [items, draw]);

  const spin = () => {
    if (spinning) return;
    setSpinning(true);

    const extra     = Math.PI * 2 * (6 + Math.random() * 5);
    const randOff   = Math.random() * Math.PI * 2;
    const targetRot = rotRef.current + extra + randOff;
    const startRot  = rotRef.current;
    const duration  = 3200 + Math.random() * 900;
    const t0        = performance.now();

    const animate = (now) => {
      const p  = Math.min((now - t0) / duration, 1);
      const ep = 1 - Math.pow(1 - p, 4);
      const r  = startRot + (targetRot - startRot) * ep;
      rotRef.current = r;
      draw(r);

      if (p < 1) {
        animRef.current = requestAnimationFrame(animate);
      } else {
        setSpinning(false);
        const TWO_PI = Math.PI * 2;
        const n   = items.length;
        const seg = TWO_PI / n;
        const norm = ((-r % TWO_PI) + TWO_PI) % TWO_PI;
        const idx  = Math.floor(norm / seg) % n;
        onResult(items[idx]);
      }
    };

    animRef.current = requestAnimationFrame(animate);
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:26 }}>
      <div style={{ position:'relative', marginTop:-50 }}>
        {/* Pointer */}
        <div style={{
          position:'absolute', top:42, left:'50%',
          transform:'translateX(-50%)',
          width:0, height:0,
          borderLeft:'13px solid transparent',
          borderRight:'13px solid transparent',
          borderTop:'26px solid #d05890',
          zIndex:10,
          filter:'drop-shadow(0 2px 2px rgba(0,0,0,.2))',
        }}/>
        <div className="wheel-frame">
          <canvas ref={canvasRef} width={800} height={800} style={{ display:'block', width:400, height:400 }}/>
        </div>
      </div>
      <button className="btn" onClick={spin} disabled={spinning} style={{ padding:'11px 56px', fontSize:24, letterSpacing:2 }}>
        {spinning ? 'Spinning…' : 'Spin!'}
      </button>
    </div>
  );
}

/* =========================================================
   ENVELOPE ANIMATION
   ========================================================= */

function EnvelopeScene({ name, item, invitation, invitationReady, onSpinAgain }) {
  const [phase, setPhase] = useState('idle'); // idle → cardRise → waiting → done
  const animDoneRef = useRef(false); // animation timer elapsed

  useEffect(() => {
    const t1 = setTimeout(() => setPhase('cardRise'), 600);
    // After animation finishes, mark timer done — only advance if invitation is ready
    const t2 = setTimeout(() => {
      animDoneRef.current = true;
      if (invitationReady) setPhase('done');
    }, 2600);
    return () => [t1, t2].forEach(clearTimeout);
  }, []);

  // If invitation arrives after the animation already finished, advance immediately
  useEffect(() => {
    if (invitationReady && animDoneRef.current && phase !== 'done') {
      setPhase('done');
    }
  }, [invitationReady]);

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:24, width:'100%' }}>

      {/* Envelope — shown while waiting for invitation */}
      {phase !== 'done' && (
        <div style={{ display:'flex', justifyContent:'center', width:'100%', animation:'popIn .5s ease' }}>
          <EnvelopeVisual phase={phase} />
        </div>
      )}

      {/* Invitation — replaces envelope, slides up 50px */}
      {phase === 'done' && invitation && (
        <div style={{
          display:'flex', flexDirection:'column', alignItems:'center', gap:16,
          width:'100%',
          animation:'invitationReveal .6s ease-out',
        }}>
          <LetterCard name={name} item={item} invitation={invitation} />
          <div style={{ display:'flex', gap:10, flexWrap:'wrap', justifyContent:'center' }}>
            <button className="btn" onClick={onSpinAgain}>↺ Spin again</button>
            <ShareButton />
          </div>
        </div>
      )}

    </div>
  );
}

function EnvelopeVisual({ phase }) {
  const risen = phase === 'cardRise';

  return (
    // clipPath: allow overflow above (card slides up), clip below (no pink bar at bottom)
    <div style={{ position:'relative', width:220, clipPath:'inset(-80px 0 0 0)' }}>

      {/* Invitation card — sits behind envelope (z-index lower than envelope), slides up 60px */}
      <div style={{
        position:'absolute',
        bottom:0,
        left:'50%',
        width:'80%',
        height:88,
        background:'white',
        border:'2px solid #e8bcd0',
        boxShadow:'3px 3px 0 #e8bcd0',
        display:'flex', alignItems:'center', justifyContent:'center',
        transform: risen ? 'translateX(-50%) translateY(-60px)' : 'translateX(-50%) translateY(0px)',
        transition:'transform 0.5s ease-out',
        zIndex:1,
      }}>
        <span style={{ fontFamily:"'Pixelify Sans',sans-serif", fontSize:13, color:'#c05080', textAlign:'center', padding:'0 10px' }}>
          ✦ Your invitation awaits ✦
        </span>
      </div>

      {/* Envelope body — on top of card, centered, defines height */}
      <img
        src="assets/main mail.png"
        style={{ display:'block', width:'100%', imageRendering:'pixelated', position:'relative', zIndex:2 }}
      />


    </div>
  );
}

async function shareToInstagram() {
  const dataUrl = SHARE_IMAGE_DATA;
  const res     = await fetch(dataUrl);
  const blob    = await res.blob();
  const file    = new File([blob], 'solo-date-invitation.png', { type: 'image/png' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    await navigator.share({ files: [file], title: 'My Solo Date Invitation 💌' });
  } else {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href     = url;
    a.download = 'solo-date-invitation.png';
    a.click();
    URL.revokeObjectURL(url);
  }
}

function ShareButton() {
  const [state, setState] = useState('idle'); // idle | loading | done

  const handleShare = async () => {
    if (state === 'loading') return;
    setState('loading');
    try {
      await shareToInstagram();
      setState('done');
      setTimeout(() => setState('idle'), 2500);
    } catch (err) {
      console.warn('Share failed:', err);
      setState('idle');
    }
  };

  const label = state === 'loading' ? '✦ Preparing…'
              : state === 'done'    ? '✓ Saved!'
              :                      '📷 Share';

  return (
    <button
      className="btn"
      onClick={handleShare}
      disabled={state === 'loading'}
      style={{ opacity: state === 'loading' ? 0.7 : 1 }}
    >
      {label}
    </button>
  );
}

/* =========================================================
   AI INVITATION GENERATION
   ========================================================= */

const WEBHOOK_URL = 'https://annatkach.app.n8n.cloud/webhook-test/generate-invitation';

async function generateInvitationFromAI({ name, level, idea }) {
  const res = await fetch(WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, level, idea }),
  });
  if (!res.ok) throw new Error(`Webhook error: ${res.status}`);
  return await res.json();
}

function aiResponseToInvitation(data, idea) {
  // Map AI shape { title, intro, steps[], closing } → app shape { title, icon, details[], closing }
  const ICONS = ['🌸','✨','💕','🌿','☕','🌷','💫','🎀','🕯️','🍵'];
  return {
    title:   data.title   || idea,
    icon:    ICONS[Math.floor(Math.random() * ICONS.length)],
    details: Array.isArray(data.steps) && data.steps.length
      ? data.steps
      : (data.intro ? [data.intro] : []),
    closing: data.closing || '',
  };
}

/* =========================================================
   FLOATING HEARTS
   ========================================================= */

function useFloatingHearts() {
  const [hearts, setHearts] = useState([]);
  const spawn = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const id = Date.now() + Math.random();
    setHearts(h => [...h, { id, x, y, em: ['💕','🌸','✨','💗'][Math.floor(Math.random()*4)] }]);
    setTimeout(() => setHearts(h => h.filter(hh => hh.id !== id)), 2000);
  };
  return [hearts, spawn];
}

    if (n) { setName(n); setScreen('generator'); }
  };

  const handleWheelResult = async (item) => {
    refresh(item);
    setSelectedItem(item);
    setInvitation(null);
    setInvitationReady(false);
    setTimeout(() => setScreen('envelope'), 600);

    try {
      const aiData = await generateInvitationFromAI({ name, level: selectedLevel, idea: item });
      setInvitation(aiResponseToInvitation(aiData, item));
    } catch (err) {
      console.warn('AI invitation failed, using local fallback:', err.message);
      const invPool = INVITATIONS[item];
      setInvitation(invPool
        ? invPool[Math.floor(Math.random() * invPool.length)]
        : getGenericInvitation(item));
    } finally {
      setInvitationReady(true);
    }
  };

  const handleSpinAgain = () => {
    setSelectedItem(null);
    setInvitation(null);
    setInvitationReady(false);
    setScreen('generator');
  };

  const TitleBox = () => (
    <div className="title-box">
      <img src="assets/solo date generator.png" alt="Solo-date generator" style={{ height:38, display:'block' }}/>
    </div>
  );

  return (
    <div style={{
      display:'flex', justifyContent:'center', alignItems:'flex-start',
      minHeight:'100vh', background:'#b0c8e0', padding:'20px 0',
    }}>
      <div
        className="phone-shell"
        onClick={screen !== 'welcome' ? spawnHeart : undefined}
        style={{ position:'relative' }}
      >
        {/* Floating hearts */}
        {hearts.map(h => (
          <div key={h.id} style={{
            position:'absolute', left:h.x, top:h.y,
            animation:'floatUp 2s ease-out forwards',
            pointerEvents:'none', fontSize:17, zIndex:200,
          }}>{h.em}</div>
        ))}

        {/* WELCOME */}
        {screen === 'welcome' && (
          <div className="screen-inner" key="welcome" style={{ animation:'fadeSlideIn .45s ease', gap:0 }}>
            <SparkleStrip/>
            <TitleBox/>

            <div style={{ fontSize:38, margin:'8px 0 18px', animation:'heartbeat 2s ease-in-out infinite' }}>🌸</div>

            <p style={{
              fontFamily:"'Pixelify Sans',sans-serif", fontSize:21, color:'#7a3a5a',
              textAlign:'center', marginBottom:18, lineHeight:1.5,
            }}>
              What's your name?
            </p>

            <input
              className="name-input"
              type="text"
              value={nameInput}
              onChange={e => setNameInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleContinue()}
              placeholder="Type your name…"
              autoFocus
            />

            <button
              className="btn btn-primary"
              onClick={handleContinue}
              style={{ marginTop:20 }}
            >
              Continue →
            </button>

            <p style={{
              fontFamily:"'Pixelify Sans',sans-serif", fontSize:15, color:'#9a6080',
              textAlign:'center', maxWidth:270, lineHeight:1.65, marginTop:28,
            }}>
              A little generator to remind you that the best company you can have is yourself ✨ — might be story-worthy 💌
            </p>
          </div>
        )}

        {/* GENERATOR */}
        {screen === 'generator' && (
          <div className="screen-inner" key="generator" style={{ animation:'fadeSlideIn .45s ease', gap:0 }}>
            <TitleBox/>

            <p style={{
              fontFamily:"'Pixelify Sans',sans-serif", fontSize:19, color:'#7a3a5a',
              marginBottom:16, textAlign:'center',
            }}>Hi {name}! Choose your level — something lovely awaits 🌸</p>

            <div style={{ display:'flex', gap:10, marginBottom:22 }}>
              {[1,2,3].map(lvl => (
                <button
                  key={lvl}
                  className={`level-btn${selectedLevel === lvl ? ' active' : ''}`}
                  onClick={() => setSelectedLevel(lvl)}
                >level {lvl}</button>
              ))}
            </div>

            {/* Level hint */}
            <p style={{
              fontFamily:"'Pixelify Sans',sans-serif", fontSize:15, color:'#9a6080',
              marginBottom:20, textAlign:'center', letterSpacing:.5,
            }}>
              {selectedLevel === 1 && '✦ cozy & low-pressure ✦'}
              {selectedLevel === 2 && '✦ stepping out a little ✦'}
              {selectedLevel === 3 && '✦ bold & fully solo ✦'}
            </p>

            <SpinningWheel
              key={selectedLevel}
              items={wheelItems}
              onResult={handleWheelResult}
            />
          </div>
        )}

        {/* ENVELOPE + LETTER */}
        {screen === 'envelope' && (
          <div className="screen-inner" key="envelope" style={{ animation:'fadeSlideIn .45s ease', gap:0, justifyContent:'center' }}>
            <EnvelopeScene
              name={name}
              item={selectedItem}
              invitation={invitation}
              invitationReady={invitationReady}
              onSpinAgain={handleSpinAgain}
            />
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
