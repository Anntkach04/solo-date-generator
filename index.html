function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function useWheelPool(level) {
  const [wheelItems, setWheelItems] = useState(() => shuffle(POOLS[level]).slice(0, 6));
  const [recentlyUsed, setRecentlyUsed] = useState([]);
  const spinCountRef = useRef(0);

  useEffect(() => {
    setWheelItems(shuffle(POOLS[level]).slice(0, 6));
    setRecentlyUsed([]);
    spinCountRef.current = 0;
  }, [level]);

  const recentRef = useRef([]);
  const stableRefresh = useCallback((selectedItem) => {
    spinCountRef.current += 1;
    const replaceCount = spinCountRef.current % 3 === 0 ? 2 : 1;
    const pool = POOLS[level];
    const newRecent = [...recentRef.current, selectedItem].slice(-20);
    recentRef.current = newRecent;

    setWheelItems(current => {
      let available = pool.filter(
        item => !current.includes(item) && !newRecent.includes(item)
      );
      if (available.length < replaceCount) {
        const minRecent = newRecent.filter(item => current.includes(item));
        recentRef.current = minRecent;
        available = pool.filter(item => !current.includes(item) && !minRecent.includes(item));
      }
      const picked = shuffle(available).slice(0, replaceCount);
      if (picked.length === 0) return current;
      const slots = shuffle([0,1,2,3,4,5]).slice(0, picked.length);
      const next = [...current];
      slots.forEach((idx, i) => { next[idx] = picked[i]; });
      return next;
    });
  }, [level]);

  return { wheelItems, refresh: stableRefresh };
}

dBbcUVv/4ivSj8NuFhQ+/4q3v23l7fX94KP+6573g8LCX56/lZzdlB37/QOGSf/vOteOUloZ9ELf3Px/49HcPnzFjUgAAAAAAAIBnuX0KSR9N7YsPe+4hrzr6+cfurW7+ofNnX/bp7/95zdlXb91b3UWf+MaVuUvuKxSuXFb4f695xwf2VJdN6pp+ck1h/VlXFZb/6Hdbdg54jzvyuIO+9vYPfyPsw+OL2yvc0V54y4kve9Ee6z6e3O/F9xU6f3Zb4aYvn71kd3Vz6uc0hn0Qt3f1F0+7+a+POn5e2D8ezc8YAAAAAAAAnvWKHkVt+b4WHjFpUu2+1L3tBa94yaWf/u6f9lb3xmNf8qLb//u8FYV7ugofetXfvnOcsn3+Xl562Pwj96XuTce+/JRVp161+e9OecXJYfz7fDTPIQAAAAAAAPAMUhyeAO972RveHvaPGFbqmgQAAAAAAACeMk9FYKmrEwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAOMD8f2s5ERViLqPnAAAAAElFTkSuQmCC';
    img.onload = () => { wheelImg.current = img; draw(rotRef.current); };
  }, []);

  const draw = useCallback((rot) => {
    const cvs = canvasRef.current;
    if (!cvs) return;
    const ctx = cvs.getContext('2d');
    const W = cvs.width, H = cvs.height;
    const cx = W / 2, cy = H / 2;
    const R = W / 2 - 6;
    const n = items.length;
    const seg = (2 * Math.PI) / n;

    ctx.clearRect(0, 0, W, H);

    // Draw rotated wheel image
    if (wheelImg.current) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);
      ctx.drawImage(wheelImg.current, -cx, -cy, W, H);
      ctx.restore();
    }

    // Draw text labels on top
    items.forEach((label, i) => {
      const midA = rot + i * seg - Math.PI / 2 + seg / 2;
      const innerR = 28; // approx center disc radius (scaled)
      const textR = innerR + (R - innerR) * 0.55;
      let tx = cx + Math.cos(midA) * textR;
      let ty = cy + Math.sin(midA) * textR;

      const dx = tx - cx;
      const dy = ty - cy;
      const len = Math.sqrt(dx * dx + dy * dy);
      tx = tx - 40 * dx / len;
      ty = ty - 40 * dy / len;

      ctx.save();
      ctx.translate(tx, ty);
      ctx.rotate(midA + Math.PI / 2);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#7a2a52';
      ctx.font = 'bold 28px "Pixelify Sans", monospace';

      const words = label.split(' ');
      if (words.length === 1 || label.length <= 12) {
        ctx.fillText(label, 0, 0);
      } else {
        const mid = Math.ceil(words.length / 2);
        ctx.fillText(words.slice(0, mid).join(' '), 0, -14);
        ctx.fillText(words.slice(mid).join(' '), 0, 14);
      }
      ctx.restore();
    });
  }, [items]);

  useEffect(() => { draw(rotRef.current); }, [items, draw]);

  const spin = () => {
    if (spinning) return;
    setSpinning(true);

    const extra     = Math.PI * 2 * (6 + Math.random() * 5);
    const randOff   = Math.random() * Math.PI * 2;
    const targetRot = rotRef.current + extra + randOff;
    const startRot  = rotRef.current;
    const duration  = 3200 + Math.random() * 900;
    const t0        = performance.now();

    const animate = (now) => {
      const p  = Math.min((now - t0) / duration, 1);
      const ep = 1 - Math.pow(1 - p, 4);
      const r  = startRot + (targetRot - startRot) * ep;
      rotRef.current = r;
      draw(r);

      if (p < 1) {
        animRef.current = requestAnimationFrame(animate);
      } else {
        setSpinning(false);
        const TWO_PI = Math.PI * 2;
        const n   = items.length;
        const seg = TWO_PI / n;
        const norm = ((-r % TWO_PI) + TWO_PI) % TWO_PI;
        const idx  = Math.floor(norm / seg) % n;
        onResult(items[idx]);
      }
    };

    animRef.current = requestAnimationFrame(animate);
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:26 }}>
      <div style={{ position:'relative', marginTop:-50 }}>
        {/* Pointer */}
        <div style={{
          position:'absolute', top:42, left:'50%',
          transform:'translateX(-50%)',
          width:0, height:0,
          borderLeft:'13px solid transparent',
          borderRight:'13px solid transparent',
          borderTop:'26px solid #d05890',
          zIndex:10,
          filter:'drop-shadow(0 2px 2px rgba(0,0,0,.2))',
        }}/>
        <div className="wheel-frame">
          <canvas ref={canvasRef} width={800} height={800} style={{ display:'block', width:400, height:400 }}/>
        </div>
      </div>
      <button className="btn" onClick={spin} disabled={spinning} style={{ padding:'11px 56px', fontSize:24, letterSpacing:2 }}>
        {spinning ? 'Spinning…' : 'Spin!'}
      </button>
    </div>
  );
}

/* =========================================================
   ENVELOPE ANIMATION
   ========================================================= */

function EnvelopeScene({ name, item, invitation, invitationReady, onSpinAgain }) {
  const [phase, setPhase] = useState('idle'); // idle → cardRise → waiting → done
  const animDoneRef = useRef(false); // animation timer elapsed

  useEffect(() => {
    const t1 = setTimeout(() => setPhase('cardRise'), 600);
    // After animation finishes, mark timer done — only advance if invitation is ready
    const t2 = setTimeout(() => {
      animDoneRef.current = true;
      if (invitationReady) setPhase('done');
    }, 2600);
    return () => [t1, t2].forEach(clearTimeout);
  }, []);

  // If invitation arrives after the animation already finished, advance immediately
  useEffect(() => {
    if (invitationReady && animDoneRef.current && phase !== 'done') {
      setPhase('done');
    }
  }, [invitationReady]);

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:24, width:'100%' }}>

      {/* Envelope — shown while waiting for invitation */}
      {phase !== 'done' && (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16, width:'100%', animation:'popIn .5s ease' }}>
          <div style={{ animation: !invitationReady ? 'mailPulse 1.6s ease-in-out infinite' : 'none' }}>
            <EnvelopeVisual phase={phase} />
          </div>
          {!invitationReady && (
            <p style={{ fontFamily:"'Pixelify Sans', monospace", fontSize:14, color:'#bf4882', opacity:0.7, letterSpacing:1 }}>
              please wait a bit 💌
            </p>
          )}
        </div>
      )}

      {/* Invitation — replaces envelope, slides up 50px */}
      {phase === 'done' && invitation && (
        <div style={{
          display:'flex', flexDirection:'column', alignItems:'center', gap:16,
          width:'100%',
          animation:'invitationReveal .6s ease-out',
        }}>
          <LetterCard name={name} item={item} invitation={invitation} />
          <div style={{ display:'flex', gap:10, flexWrap:'wrap', justifyContent:'center' }}>
            <button className="btn" onClick={onSpinAgain}>↺ Spin again</button>
            <ShareButton item={item} invitation={invitation} />
          </div>
          <p style={{ fontFamily:"'Pixelify Sans',sans-serif", fontSize:13, color:'#b08898', textAlign:'center', maxWidth:260, lineHeight:1.6, marginTop:14 }}>
            post your solo date with this invitation on your IG story.
          </p>
        </div>
      )}

    </div>
  );
}

function EnvelopeVisual({ phase }) {
  const risen = phase === 'cardRise';

  return (
    // clipPath: allow overflow above (card slides up), clip below (no pink bar at bottom)
    <div style={{ position:'relative', width:220, clipPath:'inset(-80px 0 0 0)' }}>

      {/* Invitation card — sits behind envelope (z-index lower than envelope), slides up 60px */}
      <div style={{
        position:'absolute',
        bottom:0,
        left:'50%',
        width:'80%',
        height:88,
        background:'white',
        border:'2px solid #e8bcd0',
        boxShadow:'3px 3px 0 #e8bcd0',
        display:'flex', alignItems:'center', justifyContent:'center',
        transform: risen ? 'translateX(-50%) translateY(-60px)' : 'translateX(-50%) translateY(0px)',
        transition:'transform 0.5s ease-out',
        zIndex:1,
      }}>
        <span style={{ fontFamily:"'Pixelify Sans',sans-serif", fontSize:13, color:'#c05080', textAlign:'center', padding:'0 10px' }}>
          ✦ Your invitation awaits ✦
        </span>
      </div>

      {/* Envelope body — on top of card, centered, defines height */}
      <img
        src={MAIN_MAIL_DATA} style={{ display:'block', width:'100%', imageRendering:'pixelated', position:'relative', zIndex:2 }}
      />


    </div>

async function generateShareImage(item, invitation) {
  await document.fonts.ready;

  const scale = 2; // retina quality
  const capitalize = s => s.replace(/\b\w/g, c => c.toUpperCase());
  const typeText = capitalize(item || 'Solo Date');
  const stickers = (invitation && invitation.stickers) || [];

  // ── Load envelope image ─────────────────────────────────────
  const envImg = await new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = MAIN_MAIL_DATA;
  });

  // ── Layout constants (logical px) ───────────────────────────
  const pad        = 24;                // horizontal padding
  const logicalW   = 640;
  const envW       = logicalW - pad * 2;                          // 592px
  const envH       = Math.round(envW * envImg.naturalHeight / envImg.naturalWidth);
  const cardW      = Math.round(envW * 0.9);
  const cardX      = (logicalW - cardW) / 2;

  // card content measurements
  const innerPad   = 28;
  const headerSize = 22;
  const typeSize   = typeText.length > 18 ? 32 : 38;
  const stickerSize= 26;
  const lineH      = 8;

  const typeLines  = typeText.length > 18 ? 2 : 1;
  const cardContentH =
    innerPad +
    headerSize * 2 + lineH * 2 +
    20 +                             // gap before type
    typeSize * typeLines + lineH * typeLines +
    (stickers.length ? 16 + stickerSize : 0) +
    innerPad;

  const cardH      = Math.max(cardContentH, 160);
  const overlapY   = 36;            // card overlaps envelope top by this much
  const cardY      = pad;
  const envY       = cardY + cardH - overlapY;
  const logicalH   = envY + envH + pad;

  // ── Create canvas ────────────────────────────────────────────
  const canvas = document.createElement('canvas');
  canvas.width  = logicalW * scale;
  canvas.height = logicalH * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  // transparent background by default

  // ── Card shadow ──────────────────────────────────────────────
  ctx.fillStyle = 'rgba(208,144,176,0.25)';
  ctx.fillRect(cardX + 4, cardY + 4, cardW, cardH);

  // ── Card ─────────────────────────────────────────────────────
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(cardX, cardY, cardW, cardH);
  ctx.strokeStyle = '#f0c8dc';
  ctx.lineWidth = 2;
  ctx.strokeRect(cardX, cardY, cardW, cardH);

  // ── Card text ────────────────────────────────────────────────
  const cx = logicalW / 2;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';

  // Header
  ctx.fillStyle = '#c0909c';
  ctx.font = `400 ${headerSize}px "Pixelify Sans", monospace`;
  let ty = cardY + innerPad;
  ctx.fillText('You are invited to', cx, ty);
  ty += headerSize + lineH;
  ctx.fillText('the solo-date', cx, ty);
  ty += headerSize + 20;

  // Solo date type
  ctx.fillStyle = '#d05890';
  ctx.font = `700 ${typeSize}px "Pixelify Sans", monospace`;
  if (typeText.length > 18) {
    const words = typeText.split(' ');
    const mid = Math.ceil(words.length / 2);
    ctx.fillText(words.slice(0, mid).join(' '), cx, ty);
    ty += typeSize + lineH;
    ctx.fillText(words.slice(mid).join(' '), cx, ty);
    ty += typeSize + lineH;
  } else {
    ctx.fillText(typeText, cx, ty);
    ty += typeSize + lineH;
  }

  // Stickers
  if (stickers.length) {
    ty += 6;
    ctx.font = `${stickerSize}px serif`;
    ctx.textBaseline = 'top';
    ctx.fillText(stickers.join('  '), cx, ty);
  }

  // ── Envelope (drawn on top of card bottom) ───────────────────
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(envImg, pad, envY, envW, envH);

  return canvas;
}

async function shareToInstagram(item, invitation) {
  const canvas = await generateShareImage(item, invitation);
  const blob   = await new Promise(res => canvas.toBlob(res, 'image/png'));
  const file   = new File([blob], 'solo-date-invitation.png', { type: 'image/png' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    await navigator.share({ files: [file], title: 'My Solo Date Invitation 💌' });
  } else {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href     = url;
    a.download = 'solo-date-invitation.png';
    a.click();
    URL.revokeObjectURL(url);
  }
}


function ShareButton({ item, invitation }) {
  const [state, setState] = useState('idle'); // idle | loading | done

  const handleShare = async () => {
    if (state === 'loading') return;
    setState('loading');
    try {
      await shareToInstagram(item, invitation);
      setState('done');
      setTimeout(() => setState('idle'), 2500);
    } catch (err) {
      console.warn('Share failed:', err);
      setState('idle');
    }
  };

  const label = state === 'loading' ? '✦ Preparing…'
              : state === 'done'    ? '✓ Saved!'
              :                      '📷 Share';

  return (
    <button
      className="btn"
      onClick={handleShare}
      disabled={state === 'loading'}
      style={{ opacity: state === 'loading' ? 0.7 : 1 }}
    >
      {label}
    </button>
  );
}

const GENERIC_ICONS = ['🌸','✨','💕','🌿','☕','🌷','💫','🎀','🕯️','🍵'];
const GENERIC_CLOSINGS = [
  "You deserve a day that's entirely yours.",
  "The best company you can keep is yourself.",
  "This moment was made for you.",
  "Solo doesn't mean alone — it means free.",
  "Today is a love letter to yourself.",
];

function getGenericInvitation(item) {
  const icon = GENERIC_ICONS[Math.floor(Math.random() * GENERIC_ICONS.length)];
  const closing = GENERIC_CLOSINGS[Math.floor(Math.random() * GENERIC_CLOSINGS.length)];
  return {
    title: item,
    icon,
    details: [
      `✨ Take your time getting ready — dress exactly how you feel today.`,
      `📍 Choose a spot that feels right. You don't need a plan, just a direction.`,
      `☕ Treat yourself to something small and delicious along the way.`,
      `💕 Put your phone away for a little while. Be fully present with yourself.`,
    ],
    closing,
  };
}

/* =========================================================
   AI INVITATION GENERATION
   ========================================================= */

const WEBHOOK_URL = 'https://annatkach.app.n8n.cloud/webhook/generate-invitation';

async function generateInvitationFromAI({ name, level, idea }) {
  const res = await fetch(WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, level, idea }),
  });
  if (!res.ok) throw new Error(`Webhook error: ${res.status}`);
  return await res.json();
}

function aiResponseToInvitation(data, idea) {
  // Map AI shape { title, intro, steps[], closing } → app shape { title, icon, details[], closing }
  const ICONS = ['🌸','✨','💕','🌿','☕','🌷','💫','🎀','🕯️','🍵'];
  return {
    title:   data.title   || idea,
    icon:    ICONS[Math.floor(Math.random() * ICONS.length)],
    details: Array.isArray(data.steps) && data.steps.length
      ? data.steps
      : (data.intro ? [data.intro] : []),
    closing: data.closing || '',
  };
}

/* =========================================================
   FLOATING HEARTS
   ========================================================= */

function useFloatingHearts() {
  const [hearts, setHearts] = useState([]);
  const spawn = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const id = Date.now() + Math.random();
    setHearts(h => [...h, { id, x, y, em: ['💕','🌸','✨','💗'][Math.floor(Math.random()*4)] }]);
    setTimeout(() => setHearts(h => h.filter(hh => hh.id !== id)), 2000);
  };
  return [hearts, spawn];
}

function App() {
  const [screen, setScreen]           = useState('welcome');
  const [name, setName]               = useState('');
  const [nameInput, setNameInput]     = useState('');
  const [selectedLevel, setSelectedLevel] = useState(1);
  const [selectedItem, setSelectedItem]   = useState(null);
  const [invitation, setInvitation]       = useState(null);
  const [invitationReady, setInvitationReady] = useState(false);
  const [hearts, spawnHeart]              = useFloatingHearts();
  const { wheelItems, refresh }           = useWheelPool(selectedLevel);

  const handleContinue = () => {
    const n = nameInput.trim();
    if (n) { setName(n); setScreen('generator'); }
  };

  const handleWheelResult = async (item) => {
    refresh(item);
    setSelectedItem(item);
    setInvitation(null);
    setInvitationReady(false);
    setTimeout(() => setScreen('envelope'), 600);

    try {
      const aiData = await generateInvitationFromAI({ name, level: selectedLevel, idea: item });
      setInvitation(aiResponseToInvitation(aiData, item));
    } catch (err) {
      console.warn('AI invitation failed, using local fallback:', err.message);
      const invPool = INVITATIONS[item];
      setInvitation(invPool
        ? invPool[Math.floor(Math.random() * invPool.length)]
        : getGenericInvitation(item));
    } finally {
      setInvitationReady(true);
    }
  };

  const handleSpinAgain = () => {
    setSelectedItem(null);

    </div>
  );

  return (
    <div style={{
      minHeight:'100vh',
    }}>
      <div
        className="phone-shell"
        onClick={screen !== 'welcome' ? spawnHeart : undefined}
        style={{ position:'relative' }}
      >
        {/* Floating hearts */}
        {hearts.map(h => (
          <div key={h.id} style={{
            position:'absolute', left:h.x, top:h.y,
            animation:'floatUp 2s ease-out forwards',
            pointerEvents:'none', fontSize:17, zIndex:200,
          }}>{h.em}</div>
        ))}

        {/* WELCOME */}
        {screen === 'welcome' && (
          <div className="screen-inner" key="welcome" style={{ animation:'fadeSlideIn .45s ease', gap:0 }}>
            <SparkleStrip/>
            <TitleBox/>

            <div style={{ fontSize:38, margin:'8px 0 18px', animation:'heartbeat 2s ease-in-out infinite' }}>🌸</div>

            <p style={{
              fontFamily:"'Pixelify Sans',sans-serif", fontSize:21, color:'#7a3a5a',
              textAlign:'center', marginBottom:18, lineHeight:1.5,
            }}>
              What's your name?
            </p>

            <input
              className="name-input"
              type="text"
              value={nameInput}
              onChange={e => setNameInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleContinue()}
              placeholder="Type your name…"
              autoFocus
            />

            <button
              className="btn btn-primary"
              onClick={handleContinue}
              style={{ marginTop:20 }}
            >
              Continue →
            </button>

            <p style={{
              fontFamily:"'Pixelify Sans',sans-serif", fontSize:15, color:'#9a6080',
              textAlign:'center', maxWidth:270, lineHeight:1.65, marginTop:28,
            }}>
              silly little generator to remind you that sometimes the best company you can have is yourself
              <br/><br/>
              p.s. might be IG story-worthy
            </p>
          </div>
        )}

        {/* GENERATOR */}
        {screen === 'generator' && (
          <div className="screen-inner" key="generator" style={{ animation:'fadeSlideIn .45s ease', gap:0 }}>
            <TitleBox/>

            <p style={{
              fontFamily:"'Pixelify Sans',sans-serif", fontSize:19, color:'#7a3a5a',
              marginBottom:16, textAlign:'center',
            }}>hi {name}! choose your solo-date intensity level</p>

            <div style={{ display:'flex', gap:10, marginBottom:22 }}>
              {[1,2,3].map(lvl => (
                <button
                  key={lvl}
                  className={`level-btn${selectedLevel === lvl ? ' active' : ''}`}
                  onClick={() => setSelectedLevel(lvl)}
                >level {lvl}</button>
              ))}
            </div>

            {/* Level hint */}
            <p style={{
              fontFamily:"'Pixelify Sans',sans-serif", fontSize:15, color:'#9a6080',
              marginBottom:20, textAlign:'center', letterSpacing:.5,
            }}>
              {selectedLevel === 1 && '✦ cozy & low-pressure ✦'}
              {selectedLevel === 2 && '✦ stepping out a little ✦'}
              {selectedLevel === 3 && '✦ bold & fully solo ✦'}
            </p>

            <SpinningWheel
              key={selectedLevel}
              items={wheelItems}
              onResult={handleWheelResult}
            />
          </div>
        )}

        {/* ENVELOPE + LETTER */}
        {screen === 'envelope' && (
          <div className="screen-inner" key="envelope" style={{ animation:'fadeSlideIn .45s ease', gap:0, justifyContent:'center' }}>
            <EnvelopeScene
              name={name}
              item={selectedItem}
              invitation={invitation}
              invitationReady={invitationReady}
              onSpinAgain={handleSpinAgain}
            />
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
